name: Update Profile Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Query GitHub GraphQL
        id: stats
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROFILE_STATS_TOKEN }}
          script: |
            const query = `
              query {
                viewer {
                  login
                  name
                  followers { totalCount }
                  following { totalCount }
                  publicRepos: repositories(ownerAffiliations: OWNER, isFork: false, privacy: PUBLIC) { totalCount }
                  privateRepos: repositories(ownerAffiliations: OWNER, isFork: false, privacy: PRIVATE) { totalCount }
                  contributionsCollection {
                    totalCommitContributions
                    totalPullRequestContributions
                    totalIssueContributions
                    totalRepositoryContributions
                    restrictedContributionsCount
                  }
                }
              }
            `;

            const result = await github.graphql(query);
            const v = result.viewer;
            const totalRepos = v.publicRepos.totalCount + v.privateRepos.totalCount;
            const cc = v.contributionsCollection;

            const block = [
              "### Snapshot",
              "",
              "| Metric | Value |",
              "|---|---:|",
              `| Total Repos (Owned) | ${totalRepos} |`,
              `| Public Repos | ${v.publicRepos.totalCount} |`,
              `| Private Repos | ${v.privateRepos.totalCount} |`,
              `| Followers | ${v.followers.totalCount} |`,
              `| Following | ${v.following.totalCount} |`,
              `| Commit Contributions | ${cc.totalCommitContributions} |`,
              `| PR Contributions | ${cc.totalPullRequestContributions} |`,
              `| Issue Contributions | ${cc.totalIssueContributions} |`,
              `| Repositories Contributed To | ${cc.totalRepositoryContributions} |`,
              `| Private Contribution Events (restricted) | ${cc.restrictedContributionsCount} |`,
              "",
              `_Last updated: ${new Date().toISOString()}_`
            ].join("\n");

            core.setOutput("block", block);

      - name: Inject stats into README
        env:
          BLOCK: ${{ steps.stats.outputs.block }}
        run: |
          node -e '
          const fs = require("fs");
          const start = "<!--STATS_START-->";
          const end = "<!--STATS_END-->";
          const block = process.env.BLOCK;

          const p = "README.md";
          const readme = fs.readFileSync(p, "utf8");

          if (!readme.includes(start) || !readme.includes(end)) {
            throw new Error("README markers not found");
          }

          const re = new RegExp(`${start}[\\s\\S]*${end}`, "m");
          const updated = readme.replace(re, `${start}\n${block}\n${end}`);
          fs.writeFileSync(p, updated);
          '

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(profile): update README stats"
